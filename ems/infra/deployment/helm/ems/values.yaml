# Default values for EMS Helm deployment.
replicaCount: 2

image:
  repository: ems/backend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 3000

env:
  APP_ENV: production
  LOG_FORMAT: json
  METRICS_ENABLED: true
  METRICS_PATH: /metrics
  TRACING_ENABLED: true
  HEALTHCHECK_PATH: /health
  API_RATE_LIMIT_ENABLED: true
  API_RATE_LIMIT_WINDOW_MS: 60000
  API_RATE_LIMIT_MAX: 120
  API_INPUT_VALIDATION_ENABLED: true
  API_REQUEST_SIZE_LIMIT: 1mb
  DB_POOL_MIN: 5
  DB_POOL_MAX: 50
  REDIS_CACHE_ENABLED: true
  REDIS_CACHE_DEFAULT_TTL_SECONDS: 300
  SHUTDOWN_GRACE_PERIOD_SECONDS: 30

secrets:
  existingSecret: ""
  placeholders:
    DATABASE_URL: "<set-in-secret-manager>"
    REDIS_URL: "<set-in-secret-manager>"
    KAFKA_BROKERS: "<set-in-secret-manager>"
    JWT_SECRET: "<set-in-secret-manager>"
