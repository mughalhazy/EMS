name: Build, Lint, Type-check, and Unit Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ems/package-lock.json
      - name: Install dependencies deterministically
        run: npm ci --ignore-scripts
        working-directory: ems
      - name: Dependency vulnerability audit (high/critical)
        run: npm audit --audit-level=high --omit=dev
        working-directory: ems

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run build checks
        run: ems/infra/scripts/ci/build.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run lint checks
        run: ems/infra/scripts/ci/lint.sh

  type-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run type checks
        run: ems/infra/scripts/ci/type-check.sh

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Run unit tests
        run: ems/infra/scripts/ci/test.sh
