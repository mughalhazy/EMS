name: Build and Test

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            **/package-lock.json

      - name: Build and test all Node.js projects
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t manifests < <(find ems -name package.json -not -path '*/node_modules/*' | sort)

          if [ ${#manifests[@]} -eq 0 ]; then
            echo "No package.json files found under ems/. Skipping build and test."
            exit 0
          fi

          for manifest in "${manifests[@]}"; do
            project_dir="$(dirname "$manifest")"
            echo "::group::Processing $project_dir"
            pushd "$project_dir" >/dev/null

            if [ -f package-lock.json ]; then
              npm ci
            elif [ -f npm-shrinkwrap.json ]; then
              npm ci
            else
              npm install
            fi

            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
              npm run build
            else
              echo "No build script found in $project_dir/package.json. Skipping build."
            fi

            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.test ? 0 : 1)"; then
              npm test
            else
              echo "No test script found in $project_dir/package.json. Skipping test."
            fi

            popd >/dev/null
            echo "::endgroup::"
          done
